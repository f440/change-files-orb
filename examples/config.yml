version: 2.1

orbs:
  changed-files: https://raw.githubusercontent.com/<org>/<repo>/refs/heads/main/orb.yml

jobs:
  test_with_github_api:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - changed-files/check:
          files: |
            src/**
            tests/**
            !tests/fixtures/**
      - run:
          name: Run tests
          command: make test
  test_with_main_full_test:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - when:
          condition:
            not:
              equal: [ main, << pipeline.git.branch >> ]
          steps:
            - changed-files/check:
                base-branch: develop
                files: |
                  src/**
                  tests/**
      - run:
          name: Run tests
          command: make test

workflows:
  test:
    jobs:
      - test_with_github_api:
          context:
            - github-token
      - test_with_main_full_test
