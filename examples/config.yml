version: 2.1

orbs:
  changed-files: https://raw.githubusercontent.com/<org>/<repo>/refs/heads/main/orb.yml

jobs:
  test_with_github_api:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - changed-files/check:
          files: |
            src/**
            tests/**
            pyproject.toml
      - run:
          name: Run tests
          command: python -m unittest discover
  test_with_base_branch_fallback:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - changed-files/check:
          base-branch: main
          files: |
            src/**
            tests/**
            pyproject.toml
      - run:
          name: Run tests
          command: python -m unittest discover

workflows:
  test:
    jobs:
      - test_with_github_api:
          context:
            - github-token
      - test_with_base_branch_fallback
